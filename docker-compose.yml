#What it does: Defines three "containers" — PostgreSQL, the Express server, and the React app. Tells Docker how to run them all together with one command: docker-compose up.
version: "3.9"

services:
  # ── PostgreSQL ───────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: petpals_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: petpals
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # ── Express API ──────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: petpals_server
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/petpals
      NODE_ENV: development
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    volumes:
      - ./server/src:/app/src # hot-reload in dev

  # ── React Client ─────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: petpals_client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "3000:80"

volumes:
  pgdata:
